<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your Luxe Events account to manage bookings and event details.">
  <title>Login | Luxe Events</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
  <script src="js/main.js" defer></script>
  <script src="js/animations.js" defer></script>
</head>
<body>

  <!-- Navbar -->
  <nav id="navbar" class="glass-nav fixed top-0 left-0 right-0 z-50 scrolled" role="navigation" aria-label="Main navigation">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-[72px]">
        <a href="index.html" class="font-display text-2xl font-bold text-gradient">Luxe Events</a>
        <div class="hidden md:flex items-center gap-8">
          <a href="index.html" class="nav-link">Home</a>
          <a href="login.html" class="nav-link">Login</a>
          <a href="register.html" class="nav-link">Register</a>
          <a href="booking.html" class="nav-link">Booking</a>
          <a href="contact.html" class="nav-link">Contact</a>
        </div>
        <div class="flex items-center gap-3">
          <button id="theme-toggle" class="theme-toggle relative" aria-label="Toggle dark mode">
            <svg class="icon-sun w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
            <svg class="icon-moon w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          </button>
          <button id="hamburger" class="hamburger md:hidden" aria-label="Open menu"><span></span><span></span><span></span></button>
        </div>
      </div>
    </div>
  </nav>

  <div id="mobile-menu" class="mobile-menu">
    <a href="index.html" class="nav-link">Home</a>
    <a href="login.html" class="nav-link">Login</a>
    <a href="register.html" class="nav-link">Register</a>
    <a href="booking.html" class="nav-link">Booking</a>
    <a href="contact.html" class="nav-link">Contact</a>
  </div>

  <main class="auth-page">
    <!-- Animated Background -->
    <div class="auth-bg" aria-hidden="true">
      <div class="auth-bg-shape w-96 h-96 top-10 left-10" style="background: #8B5CF6;"></div>
      <div class="auth-bg-shape w-80 h-80 bottom-20 right-10" style="background: #3B82F6; animation-delay: -3s;"></div>
      <div class="auth-bg-shape w-64 h-64 top-1/2 left-1/2" style="background: #EC4899; animation-delay: -6s;"></div>
    </div>

    <div class="auth-card">
      <div class="text-center mb-8">
        <h1 class="font-display text-3xl font-bold mb-2">Welcome Back</h1>
        <p style="color: var(--text-secondary);">Sign in to manage your events and bookings</p>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="login-email" class="form-label">Email Address</label>
          <input type="email" id="login-email" name="email" class="form-input" placeholder="you@example.com" autocomplete="email" required aria-required="true">
          <span class="form-error" role="alert"></span>
        </div>

        <div class="form-group">
          <label for="login-password" class="form-label">Password</label>
          <div class="relative">
            <input type="password" id="login-password" name="password" class="form-input pr-12" placeholder="Enter your password" autocomplete="current-password" required aria-required="true">
            <button type="button" class="password-toggle" aria-label="Show password">
              <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="form-error" role="alert"></span>
        </div>

        <div class="flex items-center justify-between mb-6">
          <label class="custom-checkbox">
            <input type="checkbox" name="remember">
            <span class="checkmark"></span>
            Remember me
          </label>
          <a href="#" class="text-sm hover:underline" style="color: var(--accent-purple);">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary w-full mb-6">Sign In</button>
      </form>

      <p class="auth-footer text-center text-sm" style="color: var(--text-secondary);">
        Don't have an account? <a href="register.html" class="font-semibold hover:underline" style="color: var(--accent-purple);">Create one</a>
      </p>
    </div>
  </main>

</body>
</html>
